<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <script>try{if(JSON.parse(localStorage.getItem('pozospharma-store'))?.state?.darkMode===false)document.documentElement.classList.remove('dark')}catch(e){}</script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PozosPharma — Ghana's trusted AI-powered pharmaceutical community. Get instant drug info, connect with verified pharmacists." />
    <meta name="theme-color" content="#C9A84C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <title>PozosPharma</title>
  </head>
  <body class="bg-surface-light dark:bg-surface-dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('[SW] registered:', reg.scope);
          }).catch((err) => {
            console.warn('[SW] registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
