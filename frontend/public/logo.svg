<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48">
  <defs>
    <!-- Ghana flag stripe gradient for accent -->
    <linearGradient id="ghanaStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CE1126"/>
      <stop offset="33.33%" stop-color="#CE1126"/>
      <stop offset="33.33%" stop-color="#FCD116"/>
      <stop offset="66.66%" stop-color="#FCD116"/>
      <stop offset="66.66%" stop-color="#006B3F"/>
      <stop offset="100%" stop-color="#006B3F"/>
    </linearGradient>
  </defs>

  <!-- Pill/Cross Icon -->
  <g transform="translate(4, 4)">
    <!-- Pill capsule -->
    <rect x="2" y="12" width="32" height="16" rx="8" ry="8" fill="#4F46E5" opacity="0.9"/>
    <!-- Pill divider line -->
    <line x1="18" y1="12" x2="18" y2="28" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Right half teal tint -->
    <clipPath id="rightHalf">
      <rect x="18" y="12" width="16" height="16"/>
    </clipPath>
    <rect x="2" y="12" width="32" height="16" rx="8" ry="8" fill="#0D9488" clip-path="url(#rightHalf)"/>

    <!-- Cross/Plus overlay (small, centered on pill) -->
    <g transform="translate(11, 14)" fill="white" opacity="0.85">
      <rect x="3" y="0" width="2" height="8" rx="0.5"/>
      <rect x="0" y="3" width="8" height="2" rx="0.5"/>
    </g>
  </g>

  <!-- "Pozos" text — bold, indigo -->
  <text x="46" y="33" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#4F46E5" letter-spacing="-0.5">
    Pozos
  </text>

  <!-- "Pharma" text — medium, teal -->
  <text x="117" y="33" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="500" fill="#0D9488" letter-spacing="-0.5">
    Pharma
  </text>

  <!-- Ghana flag stripe accent bar at bottom -->
  <rect x="46" y="39" width="150" height="3" rx="1.5" fill="url(#ghanaStripe)"/>
</svg>
