<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1520"/>
      <stop offset="100%" stop-color="#0D0B12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8893A"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="70%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="ghana" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CE1126"/>
      <stop offset="33.33%" stop-color="#CE1126"/>
      <stop offset="33.33%" stop-color="#FCD116"/>
      <stop offset="66.66%" stop-color="#FCD116"/>
      <stop offset="66.66%" stop-color="#006B3F"/>
      <stop offset="100%" stop-color="#006B3F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="10" ry="10" fill="url(#bg)"/>

  <!-- Subtle kente lines -->
  <line x1="0" y1="0" x2="44" y2="44" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>
  <line x1="44" y1="0" x2="0" y2="44" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>

  <!-- Gold ring -->
  <circle cx="22" cy="20" r="14" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.15"/>

  <!-- Medical cross -->
  <g transform="translate(22, 20)" fill="url(#gold)" filter="url(#glow)">
    <rect x="-3.5" y="-10" width="7" height="20" rx="1.5"/>
    <rect x="-10" y="-3.5" width="20" height="7" rx="1.5"/>
  </g>

  <!-- Ghana stripe at bottom -->
  <rect x="8" y="37" width="28" height="2.5" rx="1.25" fill="url(#ghana)" opacity="0.7"/>
</svg>
